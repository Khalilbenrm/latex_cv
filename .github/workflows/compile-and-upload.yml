name: Compile CV and Upload to Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repo
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install LaTeX
      # -----------------------------
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            latexmk

      # -----------------------------
      # Compile CV
      # -----------------------------
      - name: Compile PDF
        working-directory: cv_khalil_ben_romdhane/junior_developer_template
        run: |
          latexmk -xelatex -interaction=nonstopmode main.tex

      # -----------------------------
      # Rename PDF
      # -----------------------------
      - name: Rename PDF
        run: |
          mv cv_khalil_ben_romdhane/junior_developer_template/main.pdf \
             CV_BenRomdhane_Khalil_${{ github.event.release.tag_name }}.pdf

      # -----------------------------
      # Upload to GitHub Release
      # -----------------------------
      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v2
        with:
          files: CV_BenRomdhane_Khalil_${{ github.event.release.tag_name }}.pdf