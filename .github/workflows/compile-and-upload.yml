name: Compile CV and Upload to Google Drive

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            texlive-xetex \
            texlive-fonts-extra \
            texlive-latex-extra

      - name: Compile PDF
        working-directory: cv_khalil_ben_romdhane/junior_developer_template
        run: |
          xelatex -interaction=nonstopmode main.tex
          xelatex -interaction=nonstopmode main.tex

      - name: Rename PDF
        run: |
          cp \
            cv_khalil_ben_romdhane/junior_developer_template/main.pdf \
            CV_BenRomdhane_Khalil_${{ github.event.release.tag_name }}.pdf

      - name: Upload PDF to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CV_BenRomdhane_Khalil_${{ github.event.release.tag_name }}.pdf

      - name: Upload PDF to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          parent_folder_id: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          file_path: CV_BenRomdhane_Khalil_${{ github.event.release.tag_name }}.pdf
          overwrite: true