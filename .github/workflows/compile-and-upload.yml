name: Compile CV and Upload to Google Drive

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repo
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Cache LaTeX (important speed gain)
      # -----------------------------
      - name: Cache TeX Live
        uses: actions/cache@v4
        with:
          path: |
            ~/.texlive
            /usr/local/texlive
          key: texlive-${{ runner.os }}-${{ hashFiles('**/*.tex') }}

      # -----------------------------
      # Install LaTeX (minimal but complete)
      # -----------------------------
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            latexmk

      # -----------------------------
      # Compile CV
      # -----------------------------
      - name: Compile PDF
        working-directory: cv_khalil_ben_romdhane/junior_developer_template
        run: |
          latexmk -xelatex -interaction=nonstopmode main.tex

      # -----------------------------
      # Rename output file
      # -----------------------------
      - name: Rename PDF
        run: |
          mv cv_khalil_ben_romdhane/junior_developer_template/main.pdf \
             CV_BenRomdhane_Khalil_${{ github.event.release.tag_name }}.pdf

      # -----------------------------
      # Debug (optional but useful)
      # -----------------------------
      - name: List files
        run: ls -lah

      # -----------------------------
      # Upload to GitHub Release
      # -----------------------------
      - name: Upload PDF to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CV_BenRomdhane_Khalil_${{ github.event.release.tag_name }}.pdf

      # -----------------------------
      # Upload to Google Drive
      # -----------------------------
      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          filename: CV_BenRomdhane_Khalil_${{ github.event.release.tag_name }}.pdf
          overwrite: false